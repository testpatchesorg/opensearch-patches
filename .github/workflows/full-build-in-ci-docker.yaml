---

name: "Build Integration OpenSearch"
run-name: "OpenSearch ${{ inputs.open-search-tag || '3.4.0' }} with Custom Patches from ${{ inputs.patches-dir || 'patches/3.4.0' }}"
on:
  schedule:
    - cron: 0 0 1 * *
  workflow_dispatch:
    inputs:
      open-search-tag:
        type: string
        required: true
        description: "Tag in the opensearch-project/OpenSearch repository"
        default: "3.4.0"
      patches-dir:
        type: string
        description: "Direcory in this repository with patches"
        required: true
        default: "patches/3.4.0"
      target-branch:
        type: string
        required: true
        default: "main"
        description: "Target branch in qubership-opensearch repository"
      integration-tests:
        type: boolean
        description: "Whether to trigger opensearch integration tests (may take a while)"
        required: false
        default: false
      docker-test:
        type: boolean
        description: "Whether to run docker image tests after build"
        required: false
        default: true
      trigger-qubership-opensearch-build:
        type: boolean
        description: "Trigger qubership-opensearch build"
        default: true
        required: false

permissions:
  contents: read
env:
  OPEN_SEARCH_TAG: "${{ inputs.open-search-tag || '3.4.0' }}"
  PATCHES_DIR: "${{ inputs.patches-dir || 'patches/3.4.0' }}"
  TARGET_BRANCH: "${{ inputs.target-branch || 'main' }}"
  # INTEGRATION_TEST: "${{ inputs.integration-tests || 'false' }}"
  custom_branch: "applied-patches-${{ github.event.inputs.open-search-tag || '3.4.0' }}-${{ github.run_id }}"
  # default_custom_tag: "ghcr.io/${{ github.repository_owner }}/opensearch:${{ github.event.inputs.open-search-tag || '3.4.0' }}-patched"

jobs:
  apply-patches:
    permissions:
      contents: write
    name: "Apply custom patches to OpenSearch"
    outputs:
      custom-tag: ${{ steps.set-custom-tag.outputs.custom_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Set custom tag name
        id: set-custom-tag
        run: |
          echo "custom_tag=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/opensearch:${{ github.event.inputs.open-search-tag || '3.4.0' }}-patched" >> $GITHUB_OUTPUT

      - name: "Checkout OpenSearch"
        uses: actions/checkout@v5
        with:
          repository: opensearch-project/opensearch
          ref: ${{ env.OPEN_SEARCH_TAG }}
          path: opensearch
      - name: "Checkout this repository"
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          path: opensearch-custom-patches
      - name: "Apply patches"
        run: |
          cd ${GITHUB_WORKSPACE}/opensearch
          for p in ../opensearch-custom-patches/${{ env.PATCHES_DIR }}/*.patch; do
            echo "Applying $p…"
            git apply -p1 --ignore-space-change --ignore-whitespace "$p"
          done
      - name: Create a new branch and commit changes
        run: |
          cd ${GITHUB_WORKSPACE}/opensearch-custom-patches
          #rm -rf opensearch
          mv -f ${GITHUB_WORKSPACE}/opensearch/* .
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git checkout -b "${{ env.custom_branch }}"
          git add .
          git commit -m "Applied custom patches to OpenSearch ${{ env.OPEN_SEARCH_TAG }}"
          git push origin "${{ env.custom_branch }}"

  build-in-docker:
    needs: apply-patches
    runs-on: ${{ matrix.platform.name }}
    name: "${{ matrix.platform.architecture }} Build OpenSearch on ${{ matrix.platform.name }}"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu-24.04-arm
            architecture: arm64
          - name: ubuntu-24.04
            architecture: x64
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Start CI Docker container
        run: |
          docker run -d \
            --name ci-docker \
            opensearchstaging/ci-runner:ci-runner-al2-opensearch-build-v1 \
            sleep infinity

      - name: Wait for container to be ready
        run: |
          until docker exec ci-docker true 2>/dev/null; do
            echo "Waiting for container..."
            sleep 1
          done
          echo "Container is ready!"
          # docker exec --user ci-runner ci-docker bash -c "cd /home/ci-runner && mkdir -p /home/ci-runner/.gradle/caches && rm -rf /home/ci-runner/.gradle/caches/* && ls -laR /home/ci-runner/.gradle"

      - name: Debug disk space
        run: |
          echo "=== Runner disk ==="
          df -h

          echo "=== Inside container ==="
          docker exec ci-docker df -h / /tmp /home/ci-runner

      - name: Prepare script to run inside container
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/scripts
          echo """
          #!/bin/bash
          export JAVA_HOME=/opt/java/openjdk-21
          git clone -b ${OPEN_SEARCH_TAG} https://github.com/opensearch-project/opensearch-build.git
          cd opensearch-build
          # Modify build configuration to use patched OpenSearch
          if [ ! -f manifests/${{ env.OPEN_SEARCH_TAG }}/opensearch-${{ env.OPEN_SEARCH_TAG }}.yml ]; then
            echo "Error: Build manifest for OpenSearch tag ${{ env.OPEN_SEARCH_TAG }} does not exist."
            exit 1
          fi
          sed -i '
          / *- *name: *OpenSearch/,/^[[:space:]]*-/ {
          s|^\([[:space:]]*\)repository:.*|\1repository: https://github.com/${{ github.repository }}.git|
          s|^\([[:space:]]*\)ref:.*|\1ref: ${{ env.custom_branch }}|
          }
          ' manifests/${{ env.OPEN_SEARCH_TAG }}/opensearch-${{ env.OPEN_SEARCH_TAG }}.yml
          ./build.sh manifests/${{ env.OPEN_SEARCH_TAG }}/opensearch-${{ env.OPEN_SEARCH_TAG }}.yml --platform linux -a ${{ matrix.platform.architecture }}
          ./assemble.sh tar/builds/opensearch/manifest.yml
          """ > ${GITHUB_WORKSPACE}/scripts/run-build.sh
          cat ${GITHUB_WORKSPACE}/scripts/run-build.sh
      - name: Run build & assemble scripts inside container
        run: |
          cat ${GITHUB_WORKSPACE}/scripts/run-build.sh | docker exec -i --user ci-runner ci-docker sh -c 'cat > /home/ci-runner/run-build.sh'
          docker exec --user ci-runner ci-docker bash -c "cd /home/ci-runner && chmod +x /home/ci-runner/run-build.sh && /home/ci-runner/run-build.sh"
      - name: Copy build artifacts from container
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tar
          mkdir -p ${GITHUB_WORKSPACE}/dist
          docker cp ci-docker:/home/ci-runner/opensearch-build/tar/ ${GITHUB_WORKSPACE}/tar
          # docker cp ci-docker:/home/ci-runner/opensearch-build/dist/ ${GITHUB_WORKSPACE}/dist
      - name: Upload OpenSearch build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: opensearch-tar-${{ matrix.platform.architecture }}
          path: |
            ${{ github.workspace }}/tar
      # - name: Upload OpenSearch build artifacts
      #   uses: actions/upload-artifact@v5
      #   with:
      #     name: opensearch-dist-${{ matrix.platform.architecture }}
      #     path: |
      #       ${{ github.workspace }}/dist
      # - name: Execute integration tests (optional)
      #   continue-on-error: true
      #   if: ${{ inputs.integration-tests == true || github.event_name == 'schedule' }}
      #   run: |
      #     echo "Triggering opensearch integration tests..."
      #     docker exec --user ci-runner ci-docker bash -c "export JAVA_HOME=/opt/java/openjdk-21 && cd /home/ci-runner/opensearch-build && cp -r tar/* . && ./test.sh integ-test manifests/${{ env.OPEN_SEARCH_TAG }}/opensearch-${{ env.OPEN_SEARCH_TAG }}-test.yml"

  integration-tests:
    if: ${{ inputs.integration-tests == true || github.event_name == 'schedule' }}
    permissions:
      contents: read
    needs: [build-in-docker]
    runs-on: ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu-24.04-arm
            architecture: arm64
          - name: ubuntu-24.04
            architecture: x64
    steps:
      - name: Start CI Docker container
        run: |
          docker run -d \
            --name ci-docker \
            opensearchstaging/ci-runner:ci-runner-al2-opensearch-build-v1 \
            sleep infinity

      - name: Wait for container to be ready
        run: |
          until docker exec ci-docker true 2>/dev/null; do
            echo "Waiting for container..."
            sleep 1
          done
          echo "Container is ready!"
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "*-${{ matrix.platform.architecture }}"
          path: ${{ github.workspace }}/artifacts
          merge-multiple: true
      - name: Copy artifacts into container
        run: |
          ls -laR ./artifacts
          docker exec --user ci-runner ci-docker bash -c  "cd /home/ci-runner && git clone -b ${{ env.OPEN_SEARCH_TAG }} https://github.com/opensearch-project/opensearch-build.git"
          # docker exec --user ci-runner ci-docker bash -c  "mkdir -p /home/ci-runner/opensearch-build"
          docker cp ${{ github.workspace }}/artifacts/ ci-docker:/home/ci-runner/opensearch-build/
          docker cp ${{ github.workspace }}/artifacts/tar/dist ci-docker:/home/ci-runner/opensearch-build/

      - name: Execute integration tests (optional)
        continue-on-error: true
        if: ${{ inputs.integration-tests == true || github.event_name == 'schedule' }}
        run: |
          echo "Triggering opensearch integration tests..."
          docker exec --user ci-runner ci-docker bash -c "export JAVA_HOME=/opt/java/openjdk-21 && cd /home/ci-runner/opensearch-build && cp -r tar/* . && ./test.sh integ-test manifests/${{ env.OPEN_SEARCH_TAG }}/opensearch-${{ env.OPEN_SEARCH_TAG }}-test.yml"

  build-and-push-docker:
    permissions:
      contents: read
      packages: write
    uses: testpatchesorg/opensearch-patches/.github/workflows/re-docker-build.yaml@main
    needs: [build-in-docker, apply-patches]
    with:
      custom-tag: ${{ needs.apply-patches.outputs.custom-tag }}
      opensearch-tag: ${{ inputs.open-search-tag || '3.4.0' }}
      docker-test: ${{ inputs.docker-test || github.event_name == 'schedule' }}

  trigger-qubership-opensearch-build:
    if: ${{ inputs.trigger-qubership-opensearch-build == true || github.event_name == 'schedule' }}
    name: "Trigger qubership-opensearch build"
    needs: [build-and-push-docker, apply-patches]
    runs-on: ubuntu-latest
    steps:
      - name: "Trigger ${{ github.event.repository.name }}/qubership-opensearch build"
        uses: netcracker/qubership-workflow-hub/actions/custom-event@v2.0.1
        with:
          github-token: ${{ secrets.GH_ACCESS_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: qubership-opensearch
          event-type: opensearch-patched-build
          client-payload: '{"opensearch_tag": "${{ env.OPEN_SEARCH_TAG }}", "custom_opensearch_version": "${{ needs.apply-patches.outputs.custom-tag }}", "target_branch": "${{ env.TARGET_BRANCH }}"}'
