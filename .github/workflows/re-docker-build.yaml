name: "Reusable Docker Build Workflow"
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      custom-tag:
        type: string
        required: true
        description: "Full Tag in the of the produced image (ghcr.io/owner/repo/image:tag)"
      opensearch-tag:
        type: string
        required: true
        description: "Base opensearch tag"
      docker-test:
        type: boolean
        description: "Whether to run docker image tests after build"
        required: false
        default: true

jobs:
  build-and-push-docker:
    permissions:
      contents: read
      packages: write
    outputs:
      custom_image_name: ${{ steps.set-outputs.outputs.custom_image_name }}
      default_custom_tag: ${{ steps.set-outputs.outputs.default_custom_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Set outputs
        id: set-outputs
        run: |
          inputs_custom_tag=${{ inputs.custom-tag }}
          dct=${inputs_custom_tag,,}
          echo "name=${dct%:*}"
          echo "tag=${dct##*:}"
          echo "custom_image_name=${dct%:*}" >> $GITHUB_OUTPUT
          echo "default_custom_tag=${dct##*:}" >> $GITHUB_OUTPUT
      - name: "Checkout openserch-project/opensearch-build"
        uses: actions/checkout@v5
        with:
          repository: opensearch-project/opensearch-build
          ref: ${{ inputs.opensearch-tag }}
          path: opensearch-build
      - name: "Download OpenSearch build artifacts"
        uses: actions/download-artifact@v6
        with:
          path: ${{ github.workspace }}/opensearch-build/
          merge-multiple: true
      - name: "Find the OpenSearch tarball"
        id: find-tarball
        run: |
          TARFILE=$(find "${GITHUB_WORKSPACE}/opensearch-build/tar/dist/" -name 'opensearch-*.tar.gz' | sort | xargs | sed 's/ /, /g')
          if [ -z "$TARFILE" ]; then
            echo "Error: OpenSearch tarball not found!"
            exit 1
          fi
          echo "TARFILE=$TARFILE" >> $GITHUB_ENV
          echo "Found tarball(s): $TARFILE"
      - name: "Setup QEMU"
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "Build and push Docker image"
        env:
          custom_image_name: ${{ steps.set-outputs.outputs.custom_image_name }}
          default_custom_tag: ${{ steps.set-outputs.outputs.default_custom_tag }}
        run: |
          cd ${GITHUB_WORKSPACE}/opensearch-build/docker/release
          sed -i 's/TARBALL=`realpath $OPTARG`/TARBALL=`realpath -z $OPTARG`/' ./build-image-multi-arch.sh
          chmod +x ./build-image-multi-arch.sh
          ./build-image-multi-arch.sh -v ${default_custom_tag} -f ./dockerfiles/opensearch.al2023.dockerfile -p opensearch -a "arm64,x64" -t "${TARFILE}" -r ${custom_image_name}

  docker-image-tests:
    name: "${{ matrix.platform.architecture }} Docker Image Tests"
    needs: build-and-push-docker
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu-24.04-arm
            architecture: arm64
          - name: ubuntu-latest
            architecture: amd64
    runs-on: ubuntu-latest
    env:
      custom_image_name: ${{ needs.build-and-push-docker.outputs.custom_image_name }}
      default_custom_tag: ${{ needs.build-and-push-docker.outputs.default_custom_tag }}
    steps:
      - name: "Pull and test Docker image"
        run: |
          if [ "${{ inputs.docker-test }}" != "true" ]; then
            echo "Docker tests are disabled. Skipping."
            exit 0
          fi
          echo "Running tests on Docker image ${custom_image_name,,}:${default_custom_tag,,}..."
          docker run -d --rm --name ops-test -p 9200:9200 -p 9600:9600 -e OPENSEARCH_INITIAL_ADMIN_PASSWORD=InItIaL$tr0ngPa$$w0rd -e "discovery.type=single-node" ${custom_image_name}:${default_custom_tag}
          sleep 120
          docker logs ops-test | grep "Cluster health status changed from \[YELLOW\] to \[GREEN\]"
          echo "Docker image test passed successfully."
          docker stop ops-test